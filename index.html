const emptyVisit = () => ({
  visited: false,
  dateVisited: null,
  favorite: false,
  notes: "",
});

function getParkCoords(park) {
  const seeded = PARK_COORDS[park.id];
  if (seeded) return { lat: seeded[0], lng: seeded[1] };
  if (typeof park.latitude === "number" && typeof park.longitude === "number") {
    return { lat: park.latitude, lng: park.longitude };
  }
  return null;
}

function milesBetween(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLng = ((lng2 - lng1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) *
      Math.cos((lat2 * Math.PI) / 180) *
      Math.sin(dLng / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

async function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.dismissed) parsed.dismissed = [];
      return parsed;
    }
  } catch (e) {
    // corrupted or missing — fall through to seed
  }
  const seeded = {
    parks: SEED_PARKS,
    visits: Object.fromEntries(SEED_PARKS.map((p) => [p.id, emptyVisit()])),
    dismissed: [],
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
  } catch (e) {
    console.error("Failed to seed storage", e);
  }
  return seeded;
}

async function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("Failed to save storage", e);
  }
}

// ---------------------------------------------------------------------------
// Leaflet loader (loads OpenStreetMap-based Leaflet from a CDN once)
// ---------------------------------------------------------------------------

function useLeafletLoader() {
  const [ready, setReady] = useState(!!(typeof window !== "undefined" && window.L));

  useEffect(() => {
    if (typeof window === "undefined" || window.L) {
      setReady(true);
      return;
    }
    const existing = document.getElementById("leaflet-js-lib");
    if (existing) {
      if (window.L) {
        setReady(true);
      } else {
        existing.addEventListener("load", () => setReady(true));
      }
      return;
    }
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css";
    document.head.appendChild(link);

    const script = document.createElement("script");
    script.id = "leaflet-js-lib";
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js";
    script.async = true;
    script.onload = () => setReady(true);
    document.head.appendChild(script);
  }, []);

  return ready;
}

// ---------------------------------------------------------------------------
// Park Map — real interactive, pannable/zoomable map (OpenStreetMap tiles)
// ---------------------------------------------------------------------------

function ParkMap({
  parks,
  userCoords,
  locationStatus,
  selectedParkId,
  onSelectPark,
  visits,
  onToggleVisited,
  onToggleFavorite,
  onNotesChange,
  onDelete,
  showBackButton,
  onBack,
  onRequestLocation,
}) {
  const leafletReady = useLeafletLoader();
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const layerRef = useRef(null);
  const hasFitBoundsRef = useRef(false);

  const withCoords = useMemo(
    () =>
      parks
        .map((p) => ({ ...p, _coords: getParkCoords(p) }))
        .filter((p) => p._coords),
    [parks]
  );

  // Initialize the map once Leaflet is loaded and the container exists.
  useEffect(() => {
    if (!leafletReady || !containerRef.current || mapRef.current) return;
    const L = window.L;
    const map = L.map(containerRef.current, {
      zoomControl: true,
      scrollWheelZoom: true,
    }).setView([27.95, -82.46], 10);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
      maxZoom: 19,
    }).addTo(map);

    layerRef.current = L.layerGroup().addTo(map);
    mapRef.current = map;

    // Leaflet needs a nudge to size correctly inside a flex/grid layout.
    setTimeout(() => map.invalidateSize(), 50);
  }, [leafletReady]);

  // Keep markers in sync with filtered parks / user location / selection.
  useEffect(() => {
    if (!mapRef.current || !window.L) return;
    const L = window.L;
    const layer = layerRef.current;
    layer.clearLayers();

    const bounds = [];

    withCoords.forEach((p) => {
      const meta = TYPE_META[p.type] || TYPE_META.city;
      const isSelected = p.id === selectedParkId;
      const marker = L.circleMarker([p._coords.lat, p._coords.lng], {
        radius: isSelected ? 10 : 7,
        color: "#ffffff",
        weight: 1.5,
        fillColor: meta.color,
        fillOpacity: 0.9,
      });
      marker.bindTooltip(p.name, { direction: "top", offset: [0, -6] });
      marker.on("click", () => onSelectPark(p.id));
      marker.addTo(layer);
      bounds.push([p._coords.lat, p._coords.lng]);
    });

    if (userCoords) {
      const youMarker = L.circleMarker([userCoords.lat, userCoords.lng], {
        radius: 9,
        color: "#ffffff",
        weight: 2,
        fillColor: "#C1541C",
        fillOpacity: 1,
      });
      youMarker.bindTooltip("You", { direction: "top", offset: [0, -6] });
      youMarker.addTo(layer);
      bounds.push([userCoords.lat, userCoords.lng]);
    }

    if (bounds.length > 0 && !hasFitBoundsRef.current) {
      const preselected = withCoords.find((p) => p.id === selectedParkId);
      if (preselected) {
        mapRef.current.setView([preselected._coords.lat, preselected._coords.lng], 15);
      } else {
        mapRef.current.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
      }
      hasFitBoundsRef.current = true;
    }
  }, [withCoords, userCoords, selectedParkId, onSelectPark, leafletReady]);

  const selectedPark = withCoords.find((p) => p.id === selectedParkId) || null;
  const selectedVisit = selectedPark ? visits[selectedPark.id] || emptyVisit() : null;

  if (withCoords.length === 0) {
    return (
      <div className="map-empty-state">
        <MapIcon size={30} />
        <p>No parks with coordinates match your filters yet.</p>
      </div>
    );
  }

  return (
    <div className="map-wrap">
      {showBackButton && (
        <button className="back-btn" onClick={onBack}>
          <ArrowLeft size={16} /> Back
        </button>
      )}
      {locationStatus !== "granted" && locationStatus !== "loading" && (
        <div className="location-banner">
          <span>Your position isn't shown on the map because location access isn't available. Parks are still plotted at their real locations.</span>
          {locationStatus !== "unavailable" && (
            <button className="location-retry-btn" onClick={onRequestLocation}>
              <Navigation size={13} /> Enable location
            </button>
          )}
        </div>
      )}
      <div className="map-canvas-outer">
        {!leafletReady && (
          <div className="map-loading">
            <MapIcon size={22} className="spin" />
            <span>Loading map…</span>
          </div>
        )}
        <div ref={containerRef} className="leaflet-map-el" />
      </div>

      <div className="map-legend">
        {Object.entries(TYPE_META).map(([key, meta]) => (
          <span key={key} className="map-legend-item">
            <span className="map-legend-dot" style={{ background: meta.color }} />
            {meta.label}
          </span>
        ))}
        {userCoords && (
          <span className="map-legend-item">
            <span className="map-legend-dot" style={{ background: "#C1541C" }} />
            You
          </span>
        )}
      </div>

      {selectedPark ? (
        <div className="map-detail-card">
          <ParkCard
            park={selectedPark}
            visit={selectedVisit}
            distance={selectedPark._distance}
            onToggleVisited={() => onToggleVisited(selectedPark.id)}
            onToggleFavorite={() => onToggleFavorite(selectedPark.id)}
            onNotesChange={(notes) => onNotesChange(selectedPark.id, notes)}
            onDelete={() => onDelete(selectedPark.id)}
          />
        </div>
      ) : (
        <p className="map-hint">Tap a pin to see details. Pinch or scroll to zoom, drag to pan.</p>
      )}
    </div>
  );
}

export default function ParkExplorer() {
  const [loading, setLoading] = useState(true);
  const [parks, setParks] = useState([]);
  const [visits, setVisits] = useState({});
  const [typeFilter, setTypeFilter] = useState("all");
  const [activityFilter, setActivityFilter] = useState([]);
  const [search, setSearch] = useState("");
  const [unvisitedOnly, setUnvisitedOnly] = useState(false);
  const [showAddForm, setShowAddForm] = useState(false);
  const [syncMessage, setSyncMessage] = useState(null);
  const [userCoords, setUserCoords] = useState(null);
  const [locationStatus, setLocationStatus] = useState("loading"); // loading | granted | denied | unavailable
  const [activeView, setActiveView] = useState("list"); // list | map
  const [selectedParkId, setSelectedParkId] = useState(null);
  const [showFilters, setShowFilters] = useState(false);
  const [cameFromCard, setCameFromCard] = useState(false);
  const [dismissedIds, setDismissedIds] = useState([]);
  const [condensed, setCondensed] = useState(false);
  const returnScrollRef = useRef(0);
  const dismissedIdsRef = useRef([]);

  useEffect(() => {
    const onScroll = () => {
      setCondensed(window.scrollY > 40);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const requestLocation = useCallback(() => {
    if (!("geolocation" in navigator)) {
      setLocationStatus("unavailable");
      return;
    }
    setLocationStatus("loading");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setUserCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        setLocationStatus("granted");
      },
      (err) => {
        // code 1 = permission denied, 2 = position unavailable, 3 = timeout
        setLocationStatus(err && err.code === 1 ? "denied" : "retryable");
      },
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 10 * 60 * 1000 }
    );
  }, []);

  useEffect(() => {
    requestLocation();
  }, [requestLocation]);

  useEffect(() => {
    loadData().then((data) => {
      setParks(data.parks);
      setVisits(data.visits);
      const dismissed = data.dismissed || [];
      dismissedIdsRef.current = dismissed;
      setDismissedIds(dismissed);
      setLoading(false);
      // Automatically pull in any newly added seed parks — quietly if there's nothing new.
      syncNewSeedParks({ silent: true, dismissedList: dismissed });
    });
  }, []);

  const persist = useCallback((nextParks, nextVisits, nextDismissed) => {
    saveData({
      parks: nextParks,
      visits: nextVisits,
      dismissed: nextDismissed !== undefined ? nextDismissed : dismissedIdsRef.current,
    });
  }, []);

  const updateVisit = (id, patch) => {
    setVisits((prev) => {
      const next = { ...prev, [id]: { ...(prev[id] || emptyVisit()), ...patch } };
      persist(parks, next);
      return next;
    });
  };

  const toggleVisited = (id) => {
    const current = visits[id] || emptyVisit();
    updateVisit(id, {
      visited: !current.visited,
      dateVisited: !current.visited
        ? new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
        : null,
    });
  };

  const toggleFavorite = (id) => {
    const current = visits[id] || emptyVisit();
    updateVisit(id, { favorite: !current.favorite });
  };

  const setNotes = (id, notes) => {
    updateVisit(id, { notes });
  };

  const addPark = (newPark) => {
    setParks((prev) => {
      const next = [newPark, ...prev];
      const nextVisits = { ...visits, [newPark.id]: emptyVisit() };
      setVisits(nextVisits);
      persist(next, nextVisits);
      return next;
    });
    setShowAddForm(false);
  };

  const deletePark = (id) => {
    const isSeedPark = id.startsWith("seed-");
    setParks((prev) => {
      const next = prev.filter((p) => p.id !== id);
      const nextVisits = { ...visits };
      delete nextVisits[id];
      setVisits(nextVisits);

      let nextDismissed = dismissedIdsRef.current;
      if (isSeedPark && !nextDismissed.includes(id)) {
        nextDismissed = [...nextDismissed, id];
        dismissedIdsRef.current = nextDismissed;
        setDismissedIds(nextDismissed);
      }

      persist(next, nextVisits, nextDismissed);
      return next;
    });
  };

  const syncNewSeedParks = (opts = {}) => {
    const { silent = false, dismissedList } = opts;
    const dismissed = dismissedList || dismissedIdsRef.current;
    setParks((prevParks) => {
      const existingIds = new Set(prevParks.map((p) => p.id));
      const missing = SEED_PARKS.filter(
        (p) => !existingIds.has(p.id) && !dismissed.includes(p.id)
      );
      if (missing.length === 0) {
        if (!silent) {
          setSyncMessage("You're all caught up — no new parks to add.");
          setTimeout(() => setSyncMessage(null), 3500);
        }
        return prevParks;
      }
      const nextParks = [...missing, ...prevParks];
      setVisits((prevVisits) => {
        const nextVisits = { ...prevVisits };
        missing.forEach((p) => {
          nextVisits[p.id] = emptyVisit();
        });
        persist(nextParks, nextVisits, dismissed);
        return nextVisits;
      });
      setSyncMessage(
        `Added ${missing.length} new park${missing.length === 1 ? "" : "s"}: ${missing
          .map((p) => p.name)
          .join(", ")}`
      );
      setTimeout(() => setSyncMessage(null), 5000);
      return nextParks;
    });
  };

  const toggleActivityFilter = (a) => {
    setActivityFilter((prev) =>
      prev.includes(a) ? prev.filter((x) => x !== a) : [...prev, a]
    );
  };

  const openParkOnMap = (parkId) => {
    returnScrollRef.current = window.scrollY;
    setSelectedParkId(parkId);
    setActiveView("map");
    setCameFromCard(true);
  };

  const goBackToList = () => {
    setActiveView("list");
    setCameFromCard(false);
    requestAnimationFrame(() => {
      window.scrollTo({ top: returnScrollRef.current, behavior: "instant" in window ? "instant" : "auto" });
    });
  };

  const activeFilterCount =
    (typeFilter !== "all" ? 1 : 0) + activityFilter.length + (unvisitedOnly ? 1 : 0);

  const filteredParks = useMemo(() => {
    const withDistance = parks.map((p) => {
      const coords = getParkCoords(p);
      const distance =
        userCoords && coords
          ? milesBetween(userCoords.lat, userCoords.lng, coords.lat, coords.lng)
          : null;
      return { ...p, _distance: distance };
    });

    const filtered = withDistance.filter((p) => {
      if (typeFilter !== "all" && p.type !== typeFilter) return false;
      if (
        activityFilter.length > 0 &&
        !activityFilter.every((a) => (p.activities || []).includes(a))
      )
        return false;
      if (search.trim()) {
        const q = search.toLowerCase();
        if (
          !p.name.toLowerCase().includes(q) &&
          !p.address.toLowerCase().includes(q)
        )
          return false;
      }
      const visit = visits[p.id] || emptyVisit();
      if (unvisitedOnly && visit.visited) return false;
      return true;
    });

    filtered.sort((a, b) => {
      if (a._distance == null && b._distance == null) return a.name.localeCompare(b.name);
      if (a._distance == null) return 1;
      if (b._distance == null) return -1;
      return a._distance - b._distance;
    });

    return filtered;
  }, [parks, typeFilter, activityFilter, search, unvisitedOnly, visits, userCoords]);

  const stats = useMemo(() => {
    const total = parks.length;
    const visitedCount = Object.values(visits).filter((v) => v.visited).length;
    const favCount = Object.values(visits).filter((v) => v.favorite).length;
    return { total, visitedCount, favCount };
  }, [parks, visits]);

  if (loading) {
    return (
      <div className="loading-screen">
        <Compass size={28} className="spin" />
        <span>Loading your parks…</span>
        <StyleBlock />
      </div>
    );
  }

  return (
    <div className="app-root">
      <StyleBlock />

      <header className={`app-header ${condensed ? "app-header-condensed" : ""}`}>
        <div className="header-contour" aria-hidden="true">
          <svg viewBox="0 0 400 60" preserveAspectRatio="none">
            <path d="M0,40 Q50,10 100,35 T200,30 T300,45 T400,20" />
            <path d="M0,52 Q60,25 120,48 T240,42 T400,50" />
          </svg>
        </div>
        <div className="header-top">
          <div className="brand">
            <svg className="brand-badge" viewBox="0 0 100 100" aria-hidden="true">
              <circle cx="50" cy="50" r="48" fill="#16281C" />
              <circle cx="50" cy="50" r="30" fill="none" stroke="#F2EEE1" strokeWidth="3" />
              <path d="M50 26 L59 50 L50 74 L41 50 Z" fill="#C1541C" />
              <circle cx="50" cy="50" r="3.4" fill="#F2EEE1" />
            </svg>
            <h1>Waypoint</h1>
          </div>
        </div>
        <div className="stats-row">
          <div className="stat">
            <strong>{stats.total}</strong>
            <span>Parks</span>
          </div>
          <div className="stat-divider" aria-hidden="true" />
          <div className="stat">
            <strong>{stats.visitedCount}</strong>
            <span>Visited</span>
          </div>
          <div className="stat-divider" aria-hidden="true" />
          <div className="stat">
            <strong>{stats.favCount}</strong>
            <span>Favorites</span>
          </div>
        </div>
      </header>

      <div className="controls">
        {locationStatus === "denied" && (
          <div className="location-banner">
            <span>Location access was denied, so parks are sorted alphabetically instead of by closest. If you've since allowed it in your browser or phone settings, try again below.</span>
            <button className="location-retry-btn" onClick={requestLocation}>
              <Navigation size={13} /> Enable location
            </button>
          </div>
        )}
        {locationStatus === "retryable" && (
          <div className="location-banner">
            <span>Couldn't get your location just now — this is often temporary. Parks are sorted alphabetically in the meantime.</span>
            <button className="location-retry-btn" onClick={requestLocation}>
              <Navigation size={13} /> Try again
            </button>
          </div>
        )}
        {locationStatus === "unavailable" && (
          <div className="location-banner">
            <span>This browser doesn't support location — parks are sorted alphabetically instead of by distance.</span>
          </div>
        )}
        <div className="search-row">
          <Search size={16} />
          <input
            className="search-input"
            placeholder="Search parks or areas..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
          />
        </div>

        <div className="filters-toggle-row">
          <button
            className={`filters-toggle-btn ${showFilters ? "filters-toggle-active" : ""}`}
            onClick={() => setShowFilters((s) => !s)}
          >
            <SlidersHorizontal size={14} />
            Filters
            {activeFilterCount > 0 && <span className="filter-count-badge">{activeFilterCount}</span>}
            {showFilters ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
          </button>
          <div className="toggle-row-btns">
            <button className="secondary-btn small" onClick={() => syncNewSeedParks()}>
              <RefreshCw size={14} /> Sync new parks
            </button>
            <button className="primary-btn small" onClick={() => setShowAddForm(true)}>
              <Plus size={15} /> Add Park
            </button>
          </div>
        </div>

        {showFilters && (
          <div className="filters-panel">
            <div className="type-tabs">
              <button
                className={`type-tab ${typeFilter === "all" ? "type-tab-active" : ""}`}
                onClick={() => setTypeFilter("all")}
              >
                All
              </button>
              {Object.entries(TYPE_META).map(([key, meta]) => (
                <button
                  key={key}
                  className={`type-tab ${typeFilter === key ? "type-tab-active" : ""}`}
                  onClick={() => setTypeFilter(key)}
                  style={typeFilter === key ? { borderColor: meta.color, color: meta.color } : {}}
                >
                  {meta.label}
                </button>
              ))}
            </div>

            <div className="chip-row">
              {ACTIVITY_OPTIONS.map((a) => (
                <button
                  key={a}
                  className={`chip ${activityFilter.includes(a) ? "chip-active" : ""}`}
                  onClick={() => toggleActivityFilter(a)}
                >
                  {a}
                </button>
              ))}
            </div>

            <label className="toggle-label">
              <input
                type="checkbox"
                checked={unvisitedOnly}
                onChange={(e) => setUnvisitedOnly(e.target.checked)}
              />
              Show unvisited only
            </label>
          </div>
        )}

        {syncMessage && <div className="sync-banner">{syncMessage}</div>}

        <div className="view-tabs">
          <button
            className={`view-tab ${activeView === "list" ? "view-tab-active" : ""}`}
            onClick={() => {
              setActiveView("list");
              setCameFromCard(false);
            }}
          >
            <List size={14} /> List
          </button>
          <button
            className={`view-tab ${activeView === "map" ? "view-tab-active" : ""}`}
            onClick={() => {
              setActiveView("map");
              setCameFromCard(false);
            }}
          >
            <MapIcon size={14} /> Map
          </button>
        </div>
      </div>

      {activeView === "map" ? (
        <ParkMap
          parks={filteredParks}
          userCoords={userCoords}
          locationStatus={locationStatus}
          selectedParkId={selectedParkId}
          onSelectPark={setSelectedParkId}
          visits={visits}
          onToggleVisited={toggleVisited}
          onToggleFavorite={toggleFavorite}
          onNotesChange={setNotes}
          onDelete={deletePark}
          showBackButton={cameFromCard}
          onBack={goBackToList}
          onRequestLocation={requestLocation}
        />
      ) : (
        <main className="park-grid">
          {filteredParks.length === 0 && (
            <div className="empty-state">
              <TreePine size={30} />
              <p>No parks match those filters yet. Try widening your search, or add one.</p>
            </div>
          )}
          {filteredParks.map((park) => (
            <ParkCard
              key={park.id}
              park={park}
              visit={visits[park.id] || emptyVisit()}
              distance={park._distance}
              onToggleVisited={() => toggleVisited(park.id)}
              onToggleFavorite={() => toggleFavorite(park.id)}
              onNotesChange={(notes) => setNotes(park.id, notes)}
              onDelete={() => deletePark(park.id)}
              onOpenMap={openParkOnMap}
            />
          ))}
        </main>
      )}

      {showAddForm && (
        <AddParkForm onAdd={addPark} onCancel={() => setShowAddForm(false)} />
      )}
    </div>
  );
}

      .card-actions {

      .visit-btn {
        display: inline-flex; align-items: center; gap: 5px;

      .text-btn {
